name: Aggiorna dati da Excel

on:
  push:
    paths:
      - '_Tabelle sport di squadra_2026.xlsx'
      - 'scripts/update_data.py'
      - '.github/workflows/update-data.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Clona il repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pandas

      - name: Aggiorna index.html dai dati Excel
        run: python scripts/update_data.py

      - name: Commit delle modifiche
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Aggiornamento automatico dati da Excel"
          git push
